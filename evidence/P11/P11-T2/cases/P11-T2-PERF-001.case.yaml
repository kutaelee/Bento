id: P11-T2-PERF-001
name: Get performance state (idle)
request:
  method: GET
  url: /system/performance
  headers:
    Accept-Language: en-US
    Authorization: Bearer {{access_token}}
expect:
  status: 200
  assertions:
    - type: jq
      expr: '.allowed.bg_worker_concurrency >= 0'
    - type: jq
      expr: '.pressure.cpu_percent >= 0'
