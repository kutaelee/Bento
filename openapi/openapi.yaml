openapi: 3.1.0
info:
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  title: Bento (Self-Hosted NAS) API
  version: 1.0.0
  description: 'Self-hosted NAS for 1–5 users. Contracts are SSOT. Default locale:
    ko-KR; optional en-US.'
servers:
- url: https://api.nimbus-drive.com
  description: Production API
- url: http://localhost:8080
  description: Local dev
tags:
- name: System
- name: Setup
- name: Auth
- name: Users
- name: Storage
- name: Nodes
- name: Uploads
- name: Blobs
- name: Shares
- name: ACL
- name: Jobs
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    AcceptLanguage:
      name: Accept-Language
      in: header
      required: false
      schema:
        type: string
        default: ko-KR
        enum:
        - ko-KR
        - en-US
      description: Localization for error messages. Default ko-KR; supports en-US.
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
        minLength: 1
        maxLength: 128
      description: Optional idempotency key for POST operations. Strongly recommended
        for uploads and admin actions.
  schemas:
    UUID:
      type: string
      format: uuid
    ISODateTime:
      type: string
      format: date-time
    Locale:
      type: string
      enum:
      - ko-KR
      - en-US
      default: ko-KR
    ErrorResponse:
      type: object
      required:
      - error
      properties:
        error:
          type: object
          required:
          - code
          - message
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
              additionalProperties: true
            request_id:
              type: string
    SuccessResponse:
      type: object
      required:
      - ok
      properties:
        ok:
          type: boolean
          const: true
    UserRole:
      type: string
      enum:
      - ADMIN
      - USER
    User:
      type: object
      required:
      - id
      - username
      - role
      - locale
      - created_at
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        username:
          type: string
          minLength: 3
          maxLength: 32
          pattern: ^[a-zA-Z0-9_.-]+$
        display_name:
          type: string
          maxLength: 64
        role:
          $ref: '#/components/schemas/UserRole'
        locale:
          $ref: '#/components/schemas/Locale'
        created_at:
          $ref: '#/components/schemas/ISODateTime'
        last_login_at:
          $ref: '#/components/schemas/ISODateTime'
    AuthTokens:
      type: object
      required:
      - access_token
      - refresh_token
      - token_type
      - expires_in_seconds
      properties:
        token_type:
          type: string
          const: Bearer
        access_token:
          type: string
        refresh_token:
          type: string
        expires_in_seconds:
          type: integer
          minimum: 60
    SetupStatus:
      type: object
      required:
      - setup_required
      properties:
        setup_required:
          type: boolean
    SystemMode:
      type: object
      required:
      - read_only
      properties:
        read_only:
          type: boolean
          default: false
        reason:
          type: string
        updated_at:
          $ref: '#/components/schemas/ISODateTime'
    Capabilities:
      type: object
      required:
      - cpu
      - memory
      - disk
      - cgroup
      properties:
        cpu:
          type: object
          required:
          - cores_logical
          properties:
            cores_logical:
              type: integer
              minimum: 1
            cores_physical:
              type: integer
              minimum: 1
            model:
              type: string
        memory:
          type: object
          required:
          - total_bytes
          properties:
            total_bytes:
              type: integer
              minimum: 134217728
            cgroup_limit_bytes:
              type: integer
              minimum: 0
        disk:
          type: object
          required:
          - data_path
          properties:
            data_path:
              type: string
            fs_type:
              type: string
        cgroup:
          type: object
          properties:
            version:
              type: string
              enum:
              - v1
              - v2
              - none
            cpu_quota:
              type: number
    Volume:
      type: object
      required:
      - id
      - name
      - base_path
      - is_active
      - status
      - created_at
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        name:
          type: string
          maxLength: 64
        base_path:
          type: string
          description: Absolute mount path on host. Stored only here; blobs store
            relative storage_key.
        is_active:
          type: boolean
        status:
          type: string
          enum:
          - OK
          - DEGRADED
          - OFFLINE
        fs_type:
          type: string
        free_bytes:
          type: integer
          minimum: 0
        total_bytes:
          type: integer
          minimum: 0
        created_at:
          $ref: '#/components/schemas/ISODateTime'
    ValidatePathRequest:
      type: object
      required:
      - base_path
      properties:
        base_path:
          type: string
    ValidatePathResponse:
      type: object
      required:
      - ok
      - writable
      - free_bytes
      - total_bytes
      properties:
        ok:
          type: boolean
        writable:
          type: boolean
        free_bytes:
          type: integer
        total_bytes:
          type: integer
        fs_type:
          type: string
        message:
          type: string
    NodeType:
      type: string
      enum:
      - FOLDER
      - FILE
    Node:
      type: object
      required:
      - id
      - type
      - name
      - parent_id
      - path
      - created_at
      - updated_at
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        type:
          $ref: '#/components/schemas/NodeType'
        name:
          type: string
          minLength: 1
          maxLength: 255
        parent_id:
          $ref: '#/components/schemas/UUID'
        path:
          type: string
          description: ltree label path, e.g., root.n<uuidhex>...
        owner_user_id:
          $ref: '#/components/schemas/UUID'
        blob_id:
          anyOf:
          - $ref: '#/components/schemas/UUID'
          - type: 'null'
        size_bytes:
          type: integer
          minimum: 0
        mime_type:
          type: [string, 'null']
        metadata:
          type: object
          additionalProperties: true
        deleted_at:
          anyOf:
          - $ref: '#/components/schemas/ISODateTime'
          - type: 'null'
        created_at:
          $ref: '#/components/schemas/ISODateTime'
        updated_at:
          $ref: '#/components/schemas/ISODateTime'
    CreateFolderRequest:
      type: object
      required:
      - parent_id
      - name
      properties:
        parent_id:
          $ref: '#/components/schemas/UUID'
        name:
          type: string
          minLength: 1
          maxLength: 255
    ListChildrenResponse:
      type: object
      required:
      - items
      - next_cursor
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Node'
        next_cursor:
          type: [string, 'null']
    MoveCopyRequest:
      type: object
      required:
      - destination_parent_id
      properties:
        destination_parent_id:
          $ref: '#/components/schemas/UUID'
        new_name:
          type: string
          maxLength: 255
          # nullable: true (removed by fix_openapi_nullable.py; please model null via type union)
    UploadStatus:
      type: string
      enum:
      - INIT
      - UPLOADING
      - MERGING
      - COMPLETED
      - ABORTED
      - FAILED
    CreateUploadRequest:
      type: object
      required:
      - parent_id
      - filename
      - size_bytes
      properties:
        parent_id:
          $ref: '#/components/schemas/UUID'
        filename:
          type: string
          minLength: 1
          maxLength: 255
        size_bytes:
          type: integer
          minimum: 0
        sha256:
          type: string
          pattern: ^[a-fA-F0-9]{64}$
          # nullable: true (removed by fix_openapi_nullable.py; please model null via type union)
        mime_type:
          type: [string, 'null']
        modified_at:
          anyOf:
          - $ref: '#/components/schemas/ISODateTime'
          - type: 'null'
    CreateUploadResponse:
      type: object
      required:
      - upload_id
      - status
      - chunk_size_bytes
      - total_chunks
      - dedup_hit
      properties:
        upload_id:
          $ref: '#/components/schemas/UUID'
        status:
          $ref: '#/components/schemas/UploadStatus'
        chunk_size_bytes:
          type: integer
          minimum: 1048576
        total_chunks:
          type: integer
          minimum: 1
        received_chunks:
          type: array
          items:
            type: integer
        dedup_hit:
          type: boolean
          description: If true, server already had the blob; upload can be skipped;
            node may be created on complete.
    UploadSession:
      type: object
      required:
      - upload_id
      - status
      - size_bytes
      - chunk_size_bytes
      - total_chunks
      - received_chunks
      properties:
        upload_id:
          $ref: '#/components/schemas/UUID'
        status:
          $ref: '#/components/schemas/UploadStatus'
        size_bytes:
          type: integer
        chunk_size_bytes:
          type: integer
        total_chunks:
          type: integer
        received_chunks:
          type: array
          items:
            type: integer
        created_at:
          $ref: '#/components/schemas/ISODateTime'
        updated_at:
          $ref: '#/components/schemas/ISODateTime'
    CompleteUploadResponse:
      type: object
      required:
      - node_id
      - blob_id
      - sha256
      - size_bytes
      properties:
        node_id:
          $ref: '#/components/schemas/UUID'
        blob_id:
          $ref: '#/components/schemas/UUID'
        sha256:
          type: string
        size_bytes:
          type: integer
    Blob:
      type: object
      required:
      - id
      - sha256
      - size_bytes
      - storage_key
      - volume_id
      - created_at
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        sha256:
          type: string
          pattern: ^[a-fA-F0-9]{64}$
        size_bytes:
          type: integer
          minimum: 0
        storage_key:
          type: string
          description: Relative path under volume base_path.
        volume_id:
          $ref: '#/components/schemas/UUID'
        ref_count:
          type: integer
          minimum: 0
        created_at:
          $ref: '#/components/schemas/ISODateTime'
    ShareLinkCreateRequest:
      type: object
      properties:
        expires_in_seconds:
          type: integer
          minimum: 300
          maximum: 31536000
          default: 604800
        password:
          type: string
          minLength: 6
          maxLength: 128
          # nullable: true (removed by fix_openapi_nullable.py; please model null via type union)
        permission:
          type: string
          enum:
          - READ
          - READ_WRITE
          default: READ
    ShareLink:
      type: object
      required:
      - id
      - token
      - node_id
      - created_at
      - expires_at
      - permission
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        token:
          type: string
          description: Opaque token used in /s/{token}. Stored hashed in DB.
        node_id:
          $ref: '#/components/schemas/UUID'
        created_at:
          $ref: '#/components/schemas/ISODateTime'
        expires_at:
          $ref: '#/components/schemas/ISODateTime'
        permission:
          type: string
          enum:
          - READ
          - READ_WRITE
        password_required:
          type: boolean
    ACLEntry:
      type: object
      required:
      - id
      - node_id
      - principal_type
      - principal_id
      - effect
      - permissions
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        node_id:
          $ref: '#/components/schemas/UUID'
        principal_type:
          type: string
          enum:
          - USER
          - GROUP
          - SHARE_LINK
        principal_id:
          type: string
        effect:
          type: string
          enum:
          - ALLOW
          - DENY
        permissions:
          type: array
          items:
            type: string
            enum:
            - READ
            - WRITE
            - DELETE
            - SHARE
        inheritable:
          type: boolean
          default: true
    JobStatus:
      type: string
      enum:
      - QUEUED
      - RUNNING
      - SUCCEEDED
      - FAILED
      - CANCELLED
    Job:
      type: object
      required:
      - id
      - type
      - status
      - created_at
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        type:
          type: string
          enum:
          - THUMBNAIL
          - TRANSCODE
          - MIGRATION
          - TRASH_GC
          - SCAN_CLEANUP
          - MOVE_TREE
        status:
          $ref: '#/components/schemas/JobStatus'
        progress:
          type: number
          minimum: 0
          maximum: 1
        payload:
          type: object
          additionalProperties: true
        result:
          type: object
          additionalProperties: true
        error:
          type: object
          additionalProperties: true
        created_at:
          $ref: '#/components/schemas/ISODateTime'
        started_at:
          anyOf:
          - $ref: '#/components/schemas/ISODateTime'
          - type: 'null'
        finished_at:
          anyOf:
          - $ref: '#/components/schemas/ISODateTime'
          - type: 'null'
    SearchResponse:
      type: object
      required:
      - items
      - next_cursor
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Node'
        next_cursor:
          type: [string, 'null']
    VersionResponse:
      type: object
      required:
      - name
      - version
      - build_time
      properties:
        name:
          type: string
          const: nimbus-drive
        version:
          type: string
        build_time:
          $ref: '#/components/schemas/ISODateTime'
    PerformanceState:
      type: object
      required:
      - profile
      - limits
      - pressure
      - allowed
      properties:
        profile:
          type: string
          enum:
          - ECO
          - BALANCED
          - PERFORMANCE
          - CUSTOM
          default: BALANCED
        limits:
          type: object
          properties:
            bg_worker_concurrency_max:
              type: integer
              minimum: 0
            thumbnail_rps_max:
              type: number
              minimum: 0
            transcode_concurrency_max:
              type: integer
              minimum: 0
        pressure:
          type: object
          properties:
            cpu_percent:
              type: number
              minimum: 0
              maximum: 100
            iowait_percent:
              type: number
              minimum: 0
              maximum: 100
            mem_available_bytes:
              type: integer
              minimum: 0
            api_p95_ms:
              type: number
              minimum: 0
        allowed:
          type: object
          properties:
            bg_worker_concurrency:
              type: integer
              minimum: 0
            thumbnail_rps:
              type: number
              minimum: 0
            transcode_concurrency:
              type: integer
              minimum: 0
            notes:
              type: string
    CreateAdminRequest:
      type: object
      required:
      - username
      - password
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 32
          pattern: ^[a-zA-Z0-9_.-]+$
        password:
          type: string
          minLength: 8
          maxLength: 128
        display_name:
          type: string
          maxLength: 64
        locale:
          $ref: '#/components/schemas/Locale'
    LoginRequest:
      type: object
      required:
      - username
      - password
      properties:
        username:
          type: string
        password:
          type: string
    RefreshRequest:
      type: object
      required:
      - refresh_token
      properties:
        refresh_token:
          type: string
    UserPreferencesPatch:
      type: object
      required:
      - locale
      properties:
        locale:
          $ref: '#/components/schemas/Locale'
    CreateUserRequest:
      type: object
      required:
      - username
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 32
          pattern: ^[a-zA-Z0-9_.-]+$
        temp_password:
          type: string
          minLength: 8
          maxLength: 128
          # nullable: true (removed by fix_openapi_nullable.py; please model null via type union)
        role:
          $ref: '#/components/schemas/UserRole'
        display_name:
          type: string
          maxLength: 64
          # nullable: true (removed by fix_openapi_nullable.py; please model null via type union)
        locale:
          $ref: '#/components/schemas/Locale'
    Invite:
      type: object
      required:
      - id
      - expires_at
      - created_at
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        token:
          type: string
          description: One-time invite token (only returned at creation)
        expires_at:
          $ref: '#/components/schemas/ISODateTime'
        created_at:
          $ref: '#/components/schemas/ISODateTime'
        used_at:
          anyOf:
          - $ref: '#/components/schemas/ISODateTime'
          - type: 'null'
    CreateInviteRequest:
      type: object
      properties:
        expires_in_seconds:
          type: integer
          minimum: 300
          maximum: 31536000
          default: 604800
        role:
          $ref: '#/components/schemas/UserRole'
        locale:
          $ref: '#/components/schemas/Locale'
    AcceptInviteRequest:
      type: object
      required:
      - token
      - username
      - password
      properties:
        token:
          type: string
        username:
          type: string
          minLength: 3
          maxLength: 32
          pattern: ^[a-zA-Z0-9_.-]+$
        password:
          type: string
          minLength: 8
          maxLength: 128
        display_name:
          type: string
          maxLength: 64
          # nullable: true (removed by fix_openapi_nullable.py; please model null via type union)
    CreateVolumeRequest:
      type: object
      required:
      - name
      - base_path
      properties:
        name:
          type: string
          maxLength: 64
        base_path:
          type: string
          description: Absolute path, e.g., /mnt/hdd1/nas_data
    ListVolumesResponse:
      type: object
      required:
      - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Volume'
    BreadcrumbItem:
      type: object
      required:
      - id
      - name
      properties:
        id:
          $ref: '#/components/schemas/UUID'
        name:
          type: string
    BreadcrumbResponse:
      type: object
      required:
      - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/BreadcrumbItem'
    RenameRequest:
      type: object
      required:
      - new_name
      properties:
        new_name:
          type: string
          minLength: 1
          maxLength: 255
    SetAclRequest:
      type: object
      required:
      - entries
      properties:
        entries:
          type: array
          items:
            $ref: '#/components/schemas/ACLEntry'
    ListAclResponse:
      type: object
      required:
      - entries
      properties:
        entries:
          type: array
          items:
            $ref: '#/components/schemas/ACLEntry'
    AccessCheckResponse:
      type: object
      required:
      - node_id
      - allowed
      properties:
        node_id:
          $ref: '#/components/schemas/UUID'
        allowed:
          type: array
          items:
            type: string
            enum:
            - READ
            - WRITE
            - DELETE
            - SHARE
        reason:
          type: [string, 'null']
    ListTrashResponse:
      type: object
      required:
      - items
      - next_cursor
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Node'
        next_cursor:
          type: [string, 'null']
    StartMigrationRequest:
      type: object
      required:
      - target_volume_id
      properties:
        target_volume_id:
          $ref: '#/components/schemas/UUID'
        verify_sha256:
          type: boolean
          default: true
        delete_source_after:
          type: boolean
          default: false
    ScanCleanupRequest:
      type: object
      properties:
        delete_orphan_files:
          type: boolean
          default: false
        delete_orphan_db_rows:
          type: boolean
          default: false
    ListJobsResponse:
      type: object
      required:
      - items
      - next_cursor
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Job'
        next_cursor:
          type: [string, 'null']
paths:
  /health:
    get:
      operationId: getHealth
      tags:
      - System
      summary: Health check
      parameters:
      - $ref: '#/components/parameters/AcceptLanguage'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '500':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security: []
  /system/version:
    get:
      operationId: getSystemVersion
      tags:
      - System
      summary: Get version
      parameters:
      - $ref: '#/components/parameters/AcceptLanguage'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionResponse'
        '500':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security: []
  /system/capabilities:
    get:
      operationId: getSystemCapabilities
      tags:
      - System
      summary: Get hardware capabilities (probe result) (authenticated)
      parameters:
      - $ref: '#/components/parameters/AcceptLanguage'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Capabilities'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Too Many Requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      security:
      - bearerAuth: []
  /system/performance:
    get:
      operationId: getSystemPerformance
      tags:
      - System
      summary: Get current QoS / performance controller state
      security:
      - bearerAuth: []
      parameters:
      - $ref: '#/components/parameters/AcceptLanguage'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PerformanceState'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict
          content:
