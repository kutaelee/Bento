    max_file_size_bytes_default: 2199023255552
  trash:
    retention_days_default: 30
  shares:
    default_expires_in_seconds: 604800
    max_expires_in_seconds: 31536000
    password_min_length: 6
  system:
    api_timeout_seconds_default: 10
    download_timeout_seconds_default: 60
    hdd_spinup_grace_seconds: 30
  qos:
    policy: interactive-first
    pressure_thresholds_default:
      cpu_percent_soft: 50.0
      cpu_percent_hard: 70.0
      iowait_percent_soft: 5.0
      iowait_percent_hard: 10.0
      api_p95_ms_soft: 300.0
