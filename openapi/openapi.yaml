      content_type_trust: never
x-state-machines:
  UploadSession:
    states:
    - INIT
    - UPLOADING
    - MERGING
    - COMPLETED
    - ABORTED
    - FAILED
    terminal_states:
    - COMPLETED
    - ABORTED
    - FAILED
    transitions:
    - from: INIT
      event: chunk_received
      to: UPLOADING
    - from: UPLOADING
      event: chunk_received
      to: UPLOADING
    - from: UPLOADING
      event: complete_requested(all_chunks_received && !read_only)
      to: MERGING
    - from: MERGING
      event: merge_succeeded
      to: COMPLETED
    - from: MERGING
      event: merge_failed
      to: FAILED
    - from: INIT
      event: abort
      to: ABORTED
    - from: UPLOADING
      event: abort
      to: ABORTED
    - from: MERGING
      event: abort
      to: FAILED
    - from: '*'
      event: internal_error
      to: FAILED
    startup_reconciler:
      scan_interval_on_boot: once
      stuck_threshold_minutes: 30
      rules:
      - status in (UPLOADING, MERGING) and updated_at < now()-threshold => mark FAILED
        and cleanup temp chunks
      - status INIT and created_at < now()-session_ttl => mark ABORTED and cleanup
  Job:
    states:
    - QUEUED
    - RUNNING
    - SUCCEEDED
    - FAILED
    - CANCELLED
    terminal_states:
    - SUCCEEDED
    - FAILED
    - CANCELLED
    transitions:
    - from: QUEUED
      event: picked_by_worker
      to: RUNNING
    - from: RUNNING
      event: success
      to: SUCCEEDED
    - from: RUNNING
      event: error
      to: FAILED
    - from: QUEUED
      event: cancel
      to: CANCELLED
  SystemMode:
    states:
    - NORMAL
    - READ_ONLY
    transition_rule: READ_ONLY blocks all mutating endpoints (POST/PUT/PATCH/DELETE)
      except admin-only toggles and safe operations.
